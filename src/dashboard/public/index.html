<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiTeam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #030305;
      --bg-elevated: #0a0a0f;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(0,212,170,0.2);
      --primary: #00d4aa;
      --primary-dim: rgba(0,212,170,0.1);
      --accent: #6366f1;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-faint: #475569;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #00d4aa;
    }

    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 0%, rgba(0,212,170,0.04), transparent),
        radial-gradient(ellipse 400px 300px at 80% 100%, rgba(99,102,241,0.03), transparent);
    }

    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,170,0.4), transparent);
      display: none;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes scan {
      0% { top: -5%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 105%; opacity: 0; }
    }

    .glass-card {
      background: rgba(255,255,255,0.015);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
    }
    .glass-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 40px rgba(0,212,170,0.04), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .num-glow {
      text-shadow: 0 0 30px rgba(0,212,170,0.2);
    }

    .sidebar-active {
      position: relative;
    }
    .sidebar-active::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: var(--primary);
      border-radius: 0 4px 4px 0;
      box-shadow: 0 0 10px rgba(0,212,170,0.5);
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      background-size: 200% 100%;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .pulse-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    .gradient-text {
      background: linear-gradient(135deg, #00d4aa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .episode-row {
      transition: all 0.2s ease;
    }
    .episode-row:hover {
      background: rgba(0,212,170,0.02);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .btn-glow {
      position: relative;
      overflow: hidden;
    }
    .btn-glow::after {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, rgba(0,212,170,0.3), rgba(99,102,241,0.3));
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-glow:hover::after {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-in, .scan-line, .pulse-dot, .progress-ring-circle {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
      }
    }

    @media (max-width: 768px) {
      .sidebar { width: 100% !important; position: fixed; z-index: 100; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b;font-family:Inter,system-ui,sans-serif;font-size:14px;">
      Loading AiTeam...
    </div>
  </div>

  <script defer src="/app.js"></script>
</body>
</html>
